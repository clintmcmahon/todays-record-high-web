<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Thermometer tube (white shell) -->
  <rect x="12.5" y="4" width="7" height="18" rx="3.5" fill="white"/>

  <!-- Mercury fill — near the top because it's HOT -->
  <rect x="13.5" y="7" width="5" height="15" rx="2.5" fill="#EF4444"/>

  <!-- Bulb shell (white) -->
  <circle cx="16" cy="25" r="5.5" fill="white"/>

  <!-- Bulb mercury -->
  <circle cx="16" cy="25" r="4" fill="#EF4444"/>
</svg>
